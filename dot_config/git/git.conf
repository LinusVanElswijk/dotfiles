# Core config
[maintenance]
	repo = /home/linus/git/pep/core
[alias]
  profile = !bash ~/.config/git/scripts/git_profile.sh
  bb = !~/.config/git/scripts/git_better_branch.sh
  lg = !~/.config/git/scripts/git_short_log.sh
  stat = status --short
  topo = log --graph --oneline --branches --tags --simplify-by-decoration
  update = !~/.config/git/scripts/git_update.sh
  wai = !~/.config/git/scripts/git_wai.s
[commit]
  gpgsign = true
[core]
	editor = nvim
[rebase]
	updateRefs = true
[push]
  autoSetupRemote = true

# Delta config
[core]
  pager = delta
[interactive]
  diffFilter = delta --color-only
[delta]
  navigate = true  # use n and N to move between diff sections
[merge]
  conflictstyle = diff3
[diff]
  colorMoved = default
	tool = nvimdiff

[rerere]
	enabled = true
[url "https://pep-team:SECRECT_TOKEN@github.com/PEP-Repository/"]
	insteadOf = https://pep-team@github.com/PEP-Repository/
