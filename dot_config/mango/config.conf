# More option see https://github.com/DreamMaoMao/mango/wiki/

# Autostart
exec-once=kanshi
exec-once=QT_QPA_PLATFORMTHEME=gtk3 qs -c noctalia-shell

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=0
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=450
animation_duration_open=0
animation_duration_tag=0
animation_duration_close=0
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us,us
xkb_rules_variant=,dvorak

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=10
gappiv=10
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x1e1e2eff
bordercolor=0x45475aff
focuscolor=0x89b4faff
maximizescreencolor=0xcba6f7ff
urgentcolor=0xfab387ff
scratchpadcolor=0xbac2deff
globalcolor=0xa6e3a1ff
overlaycolor=0x94e2d5ff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=Super,r,reload_config

bind=Ctrl+Alt,Home,switch_keyboard_layout

# msnap
bind=Super,p,spawn,msnap shot --region
bind=Super+Shift,p,spawn,msnap gui

# XF86  Control
bind=none,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase
bind=none,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bind=none,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bind=none,XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bind=none,XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease

bind=Super,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call media previous
bind=Super,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call media next
bind=Super,XF86AudioMute,spawn,qs -c noctalia-shell ipc call media playPause

# menu and terminal
bind=Super,space,spawn,rofi -show drun
bind=Super,Return,spawn,kitty

bind=Ctrl+Alt,End,spawn_shell,rofi -show powermenu -modi powermenu:~/.config/rofi/scripts/rofi-power-menu
bind=Ctrl+Alt,L,spawn,qs -c noctalia-shell ipc call sessionMenu lock
bind=Super,q,killclient,

# switch window focus
bind=Super,Tab,focusstack,next
bind=Super+Shift,Tab,focusstack,previous
bind=Super,Left,focusdir,left
bind=Super,Right,focusdir,right
bind=Super,Up,focusdir,up
bind=Super,Down,focusdir,down

# swap window
bind=Super+Shift,Up,exchange_client,up
bind=Super+Shift,Down,exchange_client,down
bind=Super+Shift,Left,exchange_client,left
bind=Super+Shift,Right,exchange_client,right

# switch window status
bind=Super+Shift,0,toggleglobal,
bind=Alt,Tab,toggleoverview,
bind=Super+Ctrl,Return,togglefloating,
#bind=Alt,a,togglemaximizescreen,
bind=Super,f,togglefullscreen,
#bind=Alt+Shift,f,togglefakefullscreen,
bind=Super,i,minimized,
bind=Super,o,toggleoverlay,
bind=Super+Shift,I,restore_minimized
#bind=Alt,z,toggle_scratchpad

# scroller layout
#bind=Alt,e,set_proportion,1.0
#bind=Alt,x,switch_proportion_preset,

# switch layout
#bind=Super,n,switch_layout
bind=Super,n,spawn,~/.config/mango/scripts/rofi-select-layout

# tag switch
#bind=Super,Left,viewtoleft,0
#bind=CTRL,Left,viewtoleft_have_client,0
#bind=Super,Right,viewtoright,0
#bind=CTRL,Right,viewtoright_have_client,0
#bind=CTRL+Super,Left,tagtoleft,0
#bind=CTRL+Super,Right,tagtoright,0

bind=Super,1,comboview,1,0
bind=Super,2,comboview,2,0
bind=Super,3,comboview,3,0
bind=Super,4,comboview,4,0
bind=Super,5,comboview,5,0
bind=Super,6,comboview,6,0
bind=Super,7,comboview,7,0
bind=Super,8,comboview,8,0
bind=Super,9,comboview,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Super+Shift,1,tagsilent,1,0
bind=Super+Shift,2,tagsilent,2,0
bind=Super+Shift,3,tagsilent,3,0
bind=Super+Shift,4,tagsilent,4,0
bind=Super+Shift,5,tagsilent,5,0
bind=Super+Shift,6,tagsilent,6,0
bind=Super+Shift,7,tagsilent,7,0
bind=Super+Shift,8,tagsilent,8,0
bind=Super+Shift,9,tagsilent,9,0

# monitor switch
bind=Super,period,focusmon,right
bind=Super,comma,focusmon,left
bind=Super+Shift,period,tagmon,right
bind=Super+Shift,comma,tagmon,left

# gaps
#bind=Alt+Shift,X,incgaps,1
#bind=Alt+Shift,Z,incgaps,-1
#bind=Alt+Shift,R,togglegaps

# movewin
bind=Super+Ctrl,Up,movewin,+0,-250
bind=Super+Ctrl+Shift,Up,movewin,+0,-50
bind=Super+Ctrl,Down,movewin,+0,+250
bind=Super+Ctrl+Shift,Down,movewin,+0,+50
bind=Super+Ctrl,Left,movewin,-250,+0
bind=Super+Ctrl+Shift,Left,movewin,-50,+0
bind=Super+Ctrl,Right,movewin,+250,+0
bind=Super+Ctrl+Shift,Right,movewin,+50,+0

# resizewin
bind=Super+Alt,Up,resizewin,+0,-250
bind=Super+Alt+Shift,Up,resizewin,+0,-50
bind=Super+Alt,Down,resizewin,+0,+250
bind=Super+Alt+Shift,Down,resizewin,+0,+50
bind=Super+Alt,Left,resizewin,-250,+0
bind=Super+Alt+Shift,Left,resizewin,-50,+0
bind=Super+Alt,Right,resizewin,+250,+0
bind=Super+Alt+Shift,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=Super,btn_left,moveresize,curmove
#mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=Super,btn_right,moveresize,curresize


# Axis Bindings
#axisbind=Super,UP,viewtoleft_have_client
#axisbind=Super,DOWN,viewtoright_have_client


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
layerrule=layer_name:msnap,noanim:1,noblur:1
